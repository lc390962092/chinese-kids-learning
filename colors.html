<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小豆中文 - 颜色世界</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #FCE4EC 0%, #E3F2FD 100%); min-height: 100vh; overflow-x: hidden; }
        .header { text-align: center; padding: 20px 10px 10px; }
        .header h1 { color: #E91E63; font-size: 28px; margin-bottom: 5px; }
        .header p { color: #888; font-size: 14px; }
        .mascot { text-align: center; padding: 10px; }
        .mascot-bubble { display: inline-block; background: white; border-radius: 25px; padding: 12px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); color: #555; font-size: 16px; max-width: 80%; position: relative; margin-bottom: 15px; }
        .mascot-bubble::after { content: ""; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: white transparent transparent transparent; }
        .mascot-avatar { width: 60px; height: 60px; background: #FFD93D; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .main-stage { background: white; border-radius: 30px 30px 0 0; min-height: 60vh; padding: 25px 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); touch-action: pan-y; }
        .card { display: none; text-align: center; animation: fadeIn 0.5s ease; }
        .card.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-emoji { width: 200px; height: 200px; font-size: 130px; line-height: 200px; margin: 10px auto; border-radius: 30px; cursor: pointer; transition: transform 0.2s; user-select: none; }
        .card-emoji:active { transform: scale(0.95); }
        .card-title { font-size: 40px; color: #333; margin: 10px 0 5px; font-weight: bold; }
        .card-subtitle { font-size: 22px; color: #888; margin-bottom: 5px; }
        .card-japanese { font-size: 24px; color: #555; margin: 5px 0 0; font-weight: bold; }
        .card-japanese-reading { font-size: 16px; color: #999; margin-bottom: 12px; }
        .card-text { background: #f8f8f8; border-radius: 20px; padding: 18px 20px; margin: 10px auto 15px; max-width: 90%; text-align: left; font-size: 18px; line-height: 1.7; color: #444; }
        .keywords { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 18px 0; padding: 0 10px; }
        .keyword { background: #f0f0f0; color: #555; padding: 8px 16px; border-radius: 20px; font-size: 16px; cursor: pointer; }
        .keyword:active { background: #ddd; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .btn { border: none; border-radius: 25px; padding: 12px 20px; font-size: 16px; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: #E91E63; }
        .btn-secondary { background: #4ECDC4; }
        .btn-japanese { background: #FF7043; }
        .btn-english { background: #3F51B5; }
        .color-english { font-size: 24px; color: #555; margin: 5px 0 0; font-weight: bold; }
        .nav-btns { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav-btn { background: #FFCDD2; color: #333; border: none; border-radius: 25px; padding: 12px 30px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .nav-btn:active { transform: scale(0.95); }
        .progress { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .progress-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
        .progress-dot.active { background: #E91E63; }
        .swipe-hint { color: #bbb; font-size: 12px; margin-top: 8px; text-align: center; }
        .start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #FCE4EC 0%, #E3F2FD 100%); z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .start-content { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 90%; }
        .start-panda { font-size: 80px; margin-bottom: 10px; }
        .start-content h2 { color: #E91E63; font-size: 32px; margin-bottom: 10px; }
        .start-content p { color: #888; font-size: 16px; margin-bottom: 25px; }
        .start-btn { background: #E91E63; color: white; border: none; border-radius: 30px; padding: 15px 50px; font-size: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .start-btn:active { transform: scale(0.95); }
        .back-home { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .back-bar { display: block; padding: 12px 15px; color: #666; text-decoration: none; font-size: 15px; background: rgba(255,255,255,0.5); backdrop-filter: blur(5px); }
        @media (max-width: 400px) { .card-emoji { width: 170px; height: 170px; line-height: 170px; font-size: 100px; } .card-title { font-size: 34px; } }
    </style>
    <link rel="stylesheet" href="dark-mode.css">
</head>
<body>
    <a href="index.html" class="back-bar">← 回首页</a>
    <div class="start-overlay" id="startOverlay">
        <div class="start-content">
            <div class="start-panda">🐼</div>
            <h2>小豆颜色世界</h2>
            <p>一起认识美丽的颜色</p>
            <button class="start-btn" onclick="startApp()">开始学习</button>
        </div>
    </div>
    <div class="header">
        <h1>🐼 小豆中文</h1>
        <p>今天我们来学习颜色</p>
    </div>
    <div class="mascot">
        <div class="mascot-bubble" id="mascotText">你好！点击卡片，听听怎么读～左右滑动可以切换</div>
        <div class="mascot-avatar">🐼</div>
    </div>
    <div class="main-stage" id="mainStage">
        <div id="cards"></div>
        <div class="progress" id="progressDots"></div>
        <div class="swipe-hint">← 左右滑动切换卡片 →</div>
        <a href="index.html" class="back-home">⬅️ 返回首页</a>
    </div>
    <script>
        const items = [
            { word: "红色", pinyin: "hóng sè", english: "red", japanese: "赤色", japanese_reading: "あかいろ", summary: "苹果和草莓是红色的，红灯亮时我们要停下来。", words: ["红色", "红", "苹果", "草莓", "红灯"], emoji: "🔴", color: "#F44336" },
            { word: "黄色", pinyin: "huáng sè", english: "yellow", japanese: "黄色", japanese_reading: "きいろ", summary: "香蕉和柠檬是黄色的，小黄鸭也喜欢在水里游。", words: ["黄色", "黄", "香蕉", "柠檬", "小鸭"], emoji: "🟡", color: "#FFEB3B" },
            { word: "蓝色", pinyin: "lán sè", english: "blue", japanese: "青色", japanese_reading: "あおいろ", summary: "天空和大海是蓝色的，蓝蓝的颜色让人心情平静。", words: ["蓝色", "蓝", "天空", "大海", "平静"], emoji: "🔵", color: "#2196F3" },
            { word: "绿色", pinyin: "lǜ sè", english: "green", japanese: "緑色", japanese_reading: "みどりいろ", summary: "小草和树叶是绿色的，绿色代表春天和生机。", words: ["绿色", "绿", "小草", "树叶", "春天"], emoji: "🟢", color: "#4CAF50" },
            { word: "橙色", pinyin: "chéng sè", english: "orange", japanese: "橙色", japanese_reading: "だいだいいろ", summary: "橙子和胡萝卜是橙色的，像暖暖的秋天。", words: ["橙色", "橙", "橙子", "胡萝卜", "秋天"], emoji: "🟠", color: "#FF9800" },
            { word: "紫色", pinyin: "zǐ sè", english: "purple", japanese: "紫色", japanese_reading: "むらさきいろ", summary: "葡萄和茄子是紫色的，紫色像神秘的夜晚。", words: ["紫色", "紫", "葡萄", "茄子", "神秘"], emoji: "🟣", color: "#9C27B0" },
            { word: "粉色", pinyin: "fěn sè", english: "pink", japanese: "桃色", japanese_reading: "ももいろ", summary: "桃花和棉花糖是粉色的，粉粉的颜色很温柔。", words: ["粉色", "粉", "桃花", "棉花糖", "温柔"], emoji: "🌸", color: "#F8BBD0" },
            { word: "黑色", pinyin: "hēi sè", english: "black", japanese: "黒色", japanese_reading: "くろいろ", summary: "夜晚和钢琴键是黑色的，黑色也可以很优雅。", words: ["黑色", "黑", "夜晚", "钢琴", "优雅"], emoji: "⚫", color: "#333333" },
            { word: "白色", pinyin: "bái sè", english: "white", japanese: "白色", japanese_reading: "しろいろ", summary: "白云和棉花是白色的，白色干干净净。", words: ["白色", "白", "白云", "棉花", "干净"], emoji: "⚪", color: "#EEEEEE" },
            { word: "棕色", pinyin: "zōng sè", english: "brown", japanese: "茶色", japanese_reading: "ちゃいろ", summary: "小熊和树干是棕色的，棕色像大地一样温暖。", words: ["棕色", "棕", "小熊", "树干", "大地"], emoji: "🟤", color: "#795548" },
            { word: "灰色", pinyin: "huī sè", english: "gray", japanese: "灰色", japanese_reading: "はいいろ", summary: "乌云和大象是灰色的，下雨天天空常常灰灰的。", words: ["灰色", "灰", "乌云", "大象", "雨天"], emoji: "⬜", color: "#9E9E9E" },
            { word: "彩虹色", pinyin: "cǎi hóng sè", english: "rainbow", japanese: "虹色", japanese_reading: "にじいろ", summary: "彩虹有红橙黄绿蓝靛紫七种颜色，雨后挂在天上。", words: ["彩虹色", "彩虹", "七种颜色", "雨后", "天上"], emoji: "🌈", color: "linear-gradient(90deg,red,orange,yellow,green,blue,indigo,violet)" }
        ];

        let currentIndex = 0;
        let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
        const SWIPE_THRESHOLD = 50;

        const synth = window.speechSynthesis;
        let chineseVoice = null;
        let japaneseVoice = null;
        let englishVoice = null;

        function findChineseVoice(){
            if (!synth) return;
            const voices = synth.getVoices();
            for (let v of voices) { if (v.lang.startsWith('zh')) { chineseVoice = v; break; } }
        }
        function findJapaneseVoice() {
            if (!synth) return;
            const voices = synth.getVoices();
            // 优先 ja-JP，其次任何 ja 开头的日语语音
            let best = null;
            for (let v of voices) {
                if (v.lang === 'ja-JP') { best = v; break; }
            }
            if (!best) {
                for (let v of voices) {
                    if (v.lang.startsWith('ja')) { best = v; break; }
                }
            }
            japaneseVoice = best;
            if (!japaneseVoice) {
                console.log('未找到日语语音包，日语朗读将使用在线 TTS 或系统默认语音');
            }
        } }
        }
        function findEnglishVoice(){
            if (!synth) return;
            const voices = synth.getVoices();
            for (let v of voices) { if (v.lang.startsWith('en')) { englishVoice = v; break; } }
        }
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = function() { findChineseVoice(); findJapaneseVoice(); findEnglishVoice(); };
        findChineseVoice();
        findJapaneseVoice();
        findEnglishVoice();

        function speak(text, rate = 0.82){
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN'; utter.rate = rate; utter.pitch = 1.1;
            if (chineseVoice) utter.voice = chineseVoice;
            synth.speak(utter);
        }

        function speakJapanese(text) {
            if (!synth || !speechEnabled) {
                showMascot("你的浏览器不支持朗读，请用 Chrome 或 Edge 打开～");
                return;
            }
            synth.cancel();

            // 如果系统有日语语音包，优先使用本地 TTS
            if (japaneseVoice) {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'ja-JP';
                utter.rate = 0.85;
                utter.pitch = 1.0;
                utter.voice = japaneseVoice;
                synth.speak(utter);
                return;
            }

            // 没有日语语音包时，尝试 Google Translate 在线 TTS（仅日语）
            const url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=ja&client=tw-ob&q=' + encodeURIComponent(text);
            const audio = new Audio(url);
            audio.play().catch((err) => {
                console.log('在线日语 TTS 播放失败:', err);
                // 最后再尝试系统默认语音，让用户至少能听到内容（但可能是中文发音）
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'ja-JP';
                utter.rate = 0.85;
                utter.pitch = 1.0;
                synth.speak(utter);
            });
        }

        function speakEnglish(text, rate = 0.82){
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US'; utter.rate = rate; utter.pitch = 1.1;
            if (englishVoice) utter.voice = englishVoice;
            synth.speak(utter);
        }

        function playEnglish(index){
            const item = items[index];
            speakEnglish(item.english);
            showMascot('英语说：' + item.english);
        }

        function showMascot(text){ document.getElementById('mascotText').textContent = text; }

        function playWord(index){
            const item = items[index];
            speak(item.word + '，' + item.pinyin);
            showMascot('我们来看看：' + item.word + '，' + item.pinyin + '。');
        }

        function playSentence(index){
            const item = items[index];
            speak(item.summary);
            showMascot(item.summary);
        }

        function renderCards(){
            const container = document.getElementById('cards');
            container.innerHTML = items.map((item, i) => {
                const bgStyle = item.color.startsWith('linear') ? item.color : (item.color + '33');
                const keywords = item.words.map(w => `<span class="keyword" onclick="speak('${w}')">${w}</span>`).join('');
                return `<div class="card ${i===0?'active':''}">
                    <div class="card-emoji" onclick="playWord(${i})" style="background:${bgStyle}">${item.emoji}</div>
                    <div class="card-title">${item.word}</div>
                    <div class="card-subtitle">${item.pinyin}</div>
                    <div class="color-english">${item.english}</div>
                    <div class="card-japanese">${item.japanese}</div>
                    <div class="card-japanese-reading">${item.japanese_reading}</div>
                    <div class="card-text">${item.summary}</div>
                    <div class="keywords">${keywords}</div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="playWord(${i})">🔊 读颜色</button>
                        <button class="btn btn-japanese" onclick="speakJapanese(items[${i}].japanese)">🇯🇵 日语</button>
                        <button class="btn btn-english" onclick="playEnglish(${i})">🇺🇸 英语</button>
                        <button class="btn btn-secondary" onclick="playSentence(${i})">📝 读句子</button>
                    </div>
                    <div class="nav-btns">
                        <button class="nav-btn" onclick="prevItem()">⬅️ 上一个</button>
                        <button class="nav-btn" onclick="nextItem()">下一个 ➡️</button>
                    </div>
                </div>`;
            }).join('');
        }

        function renderProgress(){
            const dots = document.getElementById('progressDots');
            dots.innerHTML = items.map((_, i) => `<div class="progress-dot ${i===0?'active':''}"></div>`).join('');
        }

        function switchCard(direction){
            const cards = document.querySelectorAll('.card');
            const dots = document.querySelectorAll('.progress-dot');
            cards[currentIndex].classList.remove('active');
            dots[currentIndex].classList.remove('active');
            if (direction === 'next') currentIndex = (currentIndex + 1) % items.length;
            else currentIndex = (currentIndex - 1 + items.length) % items.length;
            cards[currentIndex].classList.add('active');
            dots[currentIndex].classList.add('active');
            const item = items[currentIndex];
            speak(item.word);
            showMascot('我们来看看：' + item.word + '，' + item.pinyin + '。');
        }

        function nextItem(){ switchCard('next'); }
        function prevItem(){ switchCard('prev'); }

        function startApp(){
            document.getElementById('startOverlay').style.display = 'none';
            if (items.length > 0){
                speak('你好！我是小豆。今天我们来学习颜色。');
                showMascot('你好！我是小豆。今天我们来学习颜色。');
            }
        }

        const mainStage = document.getElementById('mainStage');
        mainStage.addEventListener('touchstart', function(e){
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });
        mainStage.addEventListener('touchend', function(e){
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const diffX = touchStartX - endX;
            const diffY = touchStartY - endY;
            const timeDiff = Date.now() - touchStartTime;
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > SWIPE_THRESHOLD && timeDiff < 500){
                if (diffX > 0) nextItem(); else prevItem();
            }
        }, { passive: true });

        renderCards();
        renderProgress();
    </script>
</body>
</html>
