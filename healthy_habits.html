<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小豆中文 - 健康习惯</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #E0F7FA 0%, #FFF0F5 100%); min-height: 100vh; overflow-x: hidden; }
        .header { text-align: center; padding: 20px 10px 10px; }
        .header h1 { color: #00ACC1; font-size: 28px; margin-bottom: 5px; }
        .header p { color: #888; font-size: 14px; }
        .mascot { text-align: center; padding: 10px; }
        .mascot-bubble { display: inline-block; background: white; border-radius: 25px; padding: 12px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); color: #555; font-size: 16px; max-width: 80%; position: relative; margin-bottom: 15px; }
        .mascot-bubble::after { content: ""; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: white transparent transparent transparent; }
        .mascot-avatar { width: 60px; height: 60px; background: #FFD93D; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .main-stage { background: white; border-radius: 30px 30px 0 0; min-height: 60vh; padding: 25px 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); touch-action: pan-y; }
        .card { display: none; text-align: center; animation: fadeIn 0.5s ease; }
        .card.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-emoji { width: 200px; height: 200px; font-size: 130px; line-height: 200px; margin: 10px auto; background: #f8f8f8; border-radius: 30px; cursor: pointer; transition: transform 0.2s; user-select: none; }
        .card-emoji:active { transform: scale(0.95); }
        .card-title { font-size: 40px; color: #333; margin: 10px 0 5px; font-weight: bold; }
        .card-subtitle { font-size: 22px; color: #888; margin-bottom: 5px; }
        .card-japanese { font-size: 22px; color: #E91E63; margin: 8px 0 15px; font-weight: 500; cursor: pointer; }
        .card-japanese .reading { color: #999; font-size: 16px; font-weight: normal; margin-left: 6px; }
        .card-english { font-size: 22px; color: #3F51B5; margin: 8px 0 15px; font-weight: 500; cursor: pointer; }
        .card-english .reading { color: #999; font-size: 16px; font-weight: normal; margin-left: 6px; }
        .btn-english { background: #5C6BC0; }
        .card-text { background: #f8f8f8; border-radius: 20px; padding: 18px 20px; margin: 15px auto; max-width: 90%; text-align: left; font-size: 18px; line-height: 1.7; color: #444; }
        .keywords { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 18px 0; padding: 0 10px; }
        .keyword { background: #f0f0f0; color: #555; padding: 8px 16px; border-radius: 20px; font-size: 16px; cursor: pointer; }
        .keyword:active { background: #ddd; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .btn { border: none; border-radius: 25px; padding: 12px 20px; font-size: 16px; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: #00ACC1; }
        .btn-secondary { background: #4ECDC4; }
        .btn-japanese { background: #FF80AB; }
        .hint { color: #999; font-size: 13px; margin-top: 15px; text-align: center; }
        .swipe-hint { color: #bbb; font-size: 12px; margin-top: 8px; text-align: center; }
        .nav-btns { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav-btn { background: #95E1D3; color: #333; border: none; border-radius: 25px; padding: 12px 30px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .progress-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
        .progress-dot.active { background: #00ACC1; }
        .start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #E0F7FA 0%, #FFF0F5 100%); z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .start-content { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 320px; width: 90%; }
        .start-panda { font-size: 80px; margin-bottom: 10px; }
        .start-content h2 { color: #00ACC1; font-size: 32px; margin-bottom: 10px; }
        .start-content p { color: #888; font-size: 16px; margin-bottom: 25px; }
        .start-btn { background: #00ACC1; color: white; border: none; border-radius: 30px; padding: 15px 50px; font-size: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .start-btn:active { transform: scale(0.95); }
        .back-home { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .back-bar { display: block; padding: 12px 15px; color: #666; text-decoration: none; font-size: 15px; background: rgba(255,255,255,0.5); backdrop-filter: blur(5px); }
        @media (max-width: 400px) { .card-emoji { width: 170px; height: 170px; line-height: 170px; font-size: 100px; } .card-title { font-size: 34px; } .card-japanese { font-size: 20px; } .btn { padding: 10px 16px; font-size: 15px; } }
    </style>
    <link rel="stylesheet" href="dark-mode.css">
</head>
<body>
    <a href="index.html" class="back-bar">← 回首页</a>
    <div class="start-overlay" id="startOverlay">
        <div class="start-content">
            <div class="start-panda">🐼</div>
            <h2>小豆健康习惯</h2>
            <p>养成好身体，从小做起</p>
            <button class="start-btn" onclick="startApp()">开始学习</button>
        </div>
    </div>
    <div class="header">
        <h1>🐼 小豆中文</h1>
        <p>今天我们来学习健康习惯</p>
    </div>
    <div class="mascot">
        <div class="mascot-bubble" id="mascotText">你好！点击卡片，听听怎么读～左右滑动可以切换</div>
        <div class="mascot-avatar">🐼</div>
    </div>
    <div class="main-stage" id="mainStage">
        <div id="cards"></div>
        <div class="progress" id="progressDots"></div>
        <div class="hint">提示：如果听不到声音，请检查浏览器是否允许播放音频</div>
        <div class="swipe-hint">← 左右滑动切换卡片 →</div>
        <a href="index.html" class="back-home">⬅️ 返回首页</a>
    </div>
    <script>
        const items = [
            { word: "刷牙", pinyin: "shuā yá", summary: "早晚刷牙，牙齿白白，不会长虫子牙。", sentence: "早晚用牙刷上下刷，牙齿白白净净，没有蛀牙。", words: ["刷牙", "牙齿", "牙刷", "牙膏", "干净"], emoji: "🦷", japanese: "歯を磨く", japanese_reading: "はをみがく", english: "brush teeth" },
            { word: "洗手", pinyin: "xǐ shǒu", summary: "吃饭前、上厕所后要洗手，洗掉细菌不生病。", sentence: "吃饭前、上完厕所后，用肥皂搓搓手心手背，洗掉细菌。", words: ["洗手", "水", "肥皂", "细菌", "干净"], emoji: "👏", japanese: "手を洗う", japanese_reading: "てをあらう", english: "wash hands" },
            { word: "喝水", pinyin: "hē shuǐ", summary: "多喝白开水，身体不缺水，皮肤也更好。", sentence: "口渴了喝白开水，不缺水的小朋友身体棒，皮肤也水灵。", words: ["喝水", "水杯", "白开水", "健康", "解渴"], emoji: "💧", japanese: "水を飲む", japanese_reading: "みずをのむ", english: "drink water" },
            { word: "吃饭", pinyin: "chī fàn", summary: "不挑食，细嚼慢咽，不浪费粮食。", sentence: "不挑食，一口一口慢慢嚼，把碗里的饭菜都吃光。", words: ["吃饭", "米饭", "蔬菜", "不挑食", "粮食"], emoji: "🍚", japanese: "ご飯を食べる", japanese_reading: "ごはんをたべる", english: "eat" },
            { word: "睡觉", pinyin: "shuì jiào", summary: "晚上早点睡，白天才有精神玩和学习。", sentence: "晚上按时上床，闭上眼睛数小羊，白天才有精神。", words: ["睡觉", "床", "被子", "晚安", "休息"], emoji: "🛏️", japanese: "寝る", japanese_reading: "ねる", english: "sleep" },
            { word: "运动", pinyin: "yùn dòng", summary: "每天跑跑步、跳跳绳，身体棒棒的。", sentence: "每天跑跑步、跳跳绳，和小伙伴一起玩球，身体更强壮。", words: ["运动", "跑步", "跳绳", "身体", "健康"], emoji: "⚽", japanese: "運動する", japanese_reading: "うんどうする", english: "exercise" },
            { word: "打喷嚏", pinyin: "dǎ pēn tì", summary: "打喷嚏捂住嘴，病菌不会传给别人。", sentence: "打喷嚏时转过头，用手肘捂住嘴，病菌不会传给旁边的人。", words: ["打喷嚏", "纸巾", "病菌", "礼貌", "卫生"], emoji: "🤧", japanese: "くしゃみをする", japanese_reading: "くしゃみをする", english: "sneeze" },
            { word: "吃水果", pinyin: "chī shuǐ guǒ", summary: "多吃水果，补充维生素，身体更有力。", sentence: "饭后吃一个苹果或几根香蕉，补充维生素身体更有力。", words: ["水果", "苹果", "维生素", "健康", "甜甜"], emoji: "🍎", japanese: "果物を食べる", japanese_reading: "くだものをたべる", english: "eat fruit" },
            { word: "收拾玩具", pinyin: "shōu shi wán jù", summary: "玩完玩具放回原位，房间整整齐齐。", sentence: "玩完玩具放回原位，房间整整齐齐。", words: ["玩具", "收拾", "整齐", "箱子", "房间"], emoji: "🧸", japanese: "おもちゃを片付ける", japanese_reading: "おもちゃをかたづける", english: "tidy up toys" },
            { word: "穿外套", pinyin: "chuān wài tào", summary: "天冷穿外套，热了脱衣服，保护自己不感冒。", sentence: "天冷穿外套，热了脱衣服，保护自己不感冒。", words: ["外套", "衣服", "天气", "保暖", "健康"], emoji: "🧥", japanese: "上着を着る", japanese_reading: "うわぎをきる", english: "put on a jacket" },
            { word: "按时起床", pinyin: "àn shí qǐ chuáng", summary: "早上听到闹钟就起床，不要赖床，开始新的一天。", sentence: "早上闹钟响了就起床，伸个懒腰，开始新的一天。", words: ["起床", "闹钟", "早上", "按时", "精神"], emoji: "⏰", japanese: "時間通りに起きる", japanese_reading: "じかんどおりにおきる", english: "get up on time" },
            { word: "洗脸", pinyin: "xǐ liǎn", summary: "早晚洗脸，把脏东西洗掉，小脸蛋干干净净。", sentence: "早晚用温水洗脸，把灰尘和油光洗掉，小脸蛋清爽又干净。", words: ["洗脸", "毛巾", "水", "干净", "脸"], emoji: "🧼", japanese: "顔を洗う", japanese_reading: "かおをあらう", english: "wash face" },
            { word: "上厕所", pinyin: "shàng cè suǒ", summary: "想上厕所就快去，不要憋着，上完要冲水。", sentence: "想尿尿或便便就快去厕所，上完记得冲水和洗手。", words: ["厕所", "马桶", "冲水", "卫生", "洗手"], emoji: "🚽", japanese: "トイレに行く", japanese_reading: "といれにいく", english: "go to the bathroom" },
            { word: "保护眼睛", pinyin: "bǎo hù yǎn jing", summary: "少看手机，看书坐端正，眼睛才能看得清楚。", sentence: "少看屏幕，看书时坐端正，眼睛累了就望望远处的大树。", words: ["眼睛", "看书", "保护", "电视", "明亮"], emoji: "👓", japanese: "目を守る", japanese_reading: "めをまもる", english: "protect your eyes" },
            { word: "整理书包", pinyin: "zhěng lǐ shū bāo", summary: "上学前把书本和文具放进书包，不丢三落四。", sentence: "睡前把书本和文具放进书包，早上上学不慌张。", words: ["书包", "书本", "文具", "整理", "上学"], emoji: "🎒", japanese: "ランドセルを整える", japanese_reading: "らんどせるをととのえる", english: "pack your schoolbag" }
        ];

        let currentIndex = 0;
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;
        const SWIPE_THRESHOLD = 50;
        const TAP_THRESHOLD = 10;

        const synth = window.speechSynthesis;
        let chineseVoice = null;
        let japaneseVoice = null;
        let englishVoice = null;
        let speechEnabled = true;

        function findVoices() {
            if (!synth) return;
            const voices = synth.getVoices();
            for (let v of voices) {
                if (!chineseVoice && v.lang.startsWith('zh')) { chineseVoice = v; }
                if (!japaneseVoice && (v.lang === 'ja-JP' || v.lang.startsWith('ja'))) { japaneseVoice = v; }
                if (!englishVoice && v.lang.startsWith('en')) { englishVoice = v; }
                if (chineseVoice && japaneseVoice && englishVoice) break;
            }
            if (!japaneseVoice) {
                console.log('未找到日语语音包，日语朗读将使用在线 TTS 或系统默认语音');
            }
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = findVoices;
        }
        findVoices();

        function speakEnglish(text, rate = 0.82) {
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.rate = rate;
            utter.pitch = 1.1;
            if (englishVoice) utter.voice = englishVoice;
            synth.speak(utter);
            showMascot('English: ' + text);
        }

        function speakJapanese(text) {
            if (!synth || !speechEnabled) {
                showMascot("你的浏览器不支持朗读，请用 Chrome 或 Edge 打开～");
                return;
            }
            synth.cancel();

            // 如果系统有日语语音包，优先使用本地 TTS
            if (japaneseVoice) {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'ja-JP';
                utter.rate = 0.85;
                utter.pitch = 1.0;
                utter.voice = japaneseVoice;
                synth.speak(utter);
                return;
            }

            // 没有日语语音包时，尝试 Google Translate 在线 TTS（仅日语）
            const url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=ja&client=tw-ob&q=' + encodeURIComponent(text);
            const audio = new Audio(url);
            audio.play().catch((err) => {
                console.log('在线日语 TTS 播放失败:', err);
                // 最后再尝试系统默认语音，让用户至少能听到内容（但可能是中文发音）
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'ja-JP';
                utter.rate = 0.85;
                utter.pitch = 1.0;
                synth.speak(utter);
            });
        }

        function speak(text, rate = 0.82) {
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = rate;
            utter.pitch = 1.1;
            if (chineseVoice) utter.voice = chineseVoice;
            synth.speak(utter);
        }

        function showMascot(text) { document.getElementById('mascotText').textContent = text; }

        function playWord(index) {
            const item = items[index];
            speak(item.word + '，' + item.pinyin);
            showMascot('我们来看看：' + item.word + '，' + item.pinyin + '。');
        }

        function playSentence(index) {
            const item = items[index];
            speak(item.summary);
            showMascot(item.summary);
        }

        function renderCards() {
            const cardsContainer = document.getElementById('cards');
            cardsContainer.innerHTML = items.map((item, index) => `
                <div class="card ${index === 0 ? 'active' : ''}">
                    <div class="card-emoji" onclick="playWord(${index})">${item.emoji}</div>
                    <div class="card-title">${item.word}</div>
                    <div class="card-subtitle">${item.pinyin}</div>
                    <div class="card-japanese" onclick="speakJapanese('${item.japanese}')">${item.japanese}<span class="reading">${item.japanese_reading}</span></div>
                    <div class="card-english" onclick="speakEnglish('${item.english}')">${item.english}</div>
                    <div class="card-text">${item.sentence}</div>
                    <div class="keywords">${item.words.map(w => `<span class="keyword" onclick="speak('${w}')">${w}</span>`).join('')}</div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="playWord(${index})">🔊 读词语</button>
                        <button class="btn btn-secondary" onclick="playSentence(${index})">📝 读句子</button>
                        <button class="btn btn-japanese" onclick="speakJapanese('${item.japanese}')">🇯🇵 读日语</button>
                        <button class="btn btn-english" onclick="speakEnglish('${item.english}')">🇺🇸 英语</button>
                    </div>
                    <div class="nav-btns">
                        <button class="nav-btn" onclick="prevItem()">⬅️ 上一个</button>
                        <button class="nav-btn" onclick="nextItem()">下一个 ➡️</button>
                    </div>
                </div>
            `).join('');
        }

        function renderProgress() {
            const dotsContainer = document.getElementById('progressDots');
            dotsContainer.innerHTML = items.map((_, index) => `<div class="progress-dot ${index === 0 ? 'active' : ''}"></div>`).join('');
        }

        renderCards();
        renderProgress();

        function switchCard(direction) {
            const cards = document.querySelectorAll('.card');
            const dots = document.querySelectorAll('.progress-dot');
            cards[currentIndex].classList.remove('active');
            dots[currentIndex].classList.remove('active');
            if (direction === 'next') currentIndex = (currentIndex + 1) % items.length;
            else currentIndex = (currentIndex - 1 + items.length) % items.length;
            cards[currentIndex].classList.add('active');
            dots[currentIndex].classList.add('active');
            const item = items[currentIndex];
            speak(item.word);
            showMascot('我们来看看：' + item.word + '，' + item.pinyin + '。');
        }

        function nextItem() { switchCard('next'); }
        function prevItem() { switchCard('prev'); }

        function startApp() {
            document.getElementById('startOverlay').style.display = 'none';
            if (items.length > 0) {
                speak('你好！我是小豆。今天我们来学习健康习惯。');
                showMascot('你好！我是小豆。今天我们来学习健康习惯。');
            }
        }

        // 滑动切换
        const mainStage = document.getElementById('mainStage');
        mainStage.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });

        mainStage.addEventListener('touchmove', function(e) {
            // 默认不阻止，保留垂直滚动
        }, { passive: true });

        mainStage.addEventListener('touchend', function(e) {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;
            const timeDiff = Date.now() - touchStartTime;

            // 如果主要是水平滑动，且距离和时间满足条件
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > SWIPE_THRESHOLD && timeDiff < 500) {
                if (diffX > 0) nextItem();
                else prevItem();
            }
        }, { passive: true });
    </script>
</body>
</html>
