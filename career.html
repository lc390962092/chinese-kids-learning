        const synth = window.speechSynthesis;

        function findChineseVoice(){
            if (!synth) return;
            const voices = synth.getVoices();
            for (let v of voices) {
                if (v.lang.startsWith('zh')) { chineseVoice = v; break; }
            }
        }
        
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = function() {
                findChineseVoice();
                findJapaneseVoice();
                findEnglishVoice();
            };
        }
        findChineseVoice();
        findJapaneseVoice();
        findEnglishVoice();
        
        function speak(text, rate = 0.82) {
            if (!synth) return;
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = rate;
            utter.pitch = 1.1;
            if (chineseVoice) utter.voice = chineseVoice;
            synth.speak(utter);
        }
        

        let japaneseVoice = null;
        
        function findJapaneseVoice() {
            if (!synth) return;
            const voices = synth.getVoices();
            // 优先 ja-JP，其次任何 ja 开头的日语语音
            let best = null;
            for (let v of voices) {
                if (v.lang === 'ja-JP') { best = v; break; }
            }
            if (!best) {
                for (let v of voices) {
                    if (v.lang.startsWith('ja')) { best = v; break; }
                }
            }
            japaneseVoice = best;
            if (!japaneseVoice) {
                console.log('未找到日语语音包，日语朗读将使用在线 TTS 或系统默认语音');
            }
        }
            }
        }
        
        let englishVoice = null;
        let speechEnabled = true;
        
        function findEnglishVoice(){
            if (!synth) return;
            const voices = synth.getVoices();
            for (let v of voices) {
                if (v.lang.startsWith('en')) { englishVoice = v; break; }
            }
        }
        
        function renderCards() {
            const cardsContainer = document.getElementById('cards');
            const dotsContainer = document.getElementById('progressDots');
            cardsContainer.innerHTML = '';
            dotsContainer.innerHTML = '';
            items.forEach((item, index) => {
                const keywordsHtml = item.words.map(w => `<span class="keyword" onclick="speak('${w}')">${w}</span>`).join('');
                const card = document.createElement('div');
                card.className = 'card' + (index === 0 ? ' active' : '');
                card.innerHTML = `
                    <div class="card-emoji" onclick="playWord(${index})">${item.emoji}</div>
                    <div class="card-title">${item.word}</div>
                    <div class="card-subtitle">${item.pinyin}</div>
                    <div class="card-japanese">${item.japanese}</div>
                    <div class="card-japanese-reading">${item.japanese_reading}</div>
                    <div class="card-english">${item.english}</div>
                    <div class="card-text">${item.summary}</div>
                    <div class="keywords">${keywordsHtml}</div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="playWord(${index})">🔊 读词语</button>
                        <button class="btn btn-secondary" onclick="playSentence(${index})">📝 读句子</button>
                        <button class="btn btn-japanese" onclick="speakJapanese('${item.japanese}')">🇯🇵 日语</button>
                        <button class="btn btn-english" onclick="speakEnglish(${index})">🇺🇸 英语</button>
                    </div>
                    <div class="nav-btns">
                        <button class="nav-btn" onclick="prevItem()">⬅️ 上一个</button>
                        <button class="nav-btn" onclick="nextItem()">下一个 ➡️</button>
                    </div>
                `;
                cardsContainer.appendChild(card);
                const dot = document.createElement('div');
                dot.className = 'progress-dot' + (index === 0 ? ' active' : '');
                dotsContainer.appendChild(dot);
            });
        }
        
        function speakJapanese(text) {
            if (!synth || !speechEnabled) {
                showMascot("你的浏览器不支持朗读，请用 Chrome 或 Edge 打开～");
                return;
            }
            synth.cancel();

            // 如果系统有日语语音包，优先使用本地 TTS
            if (japaneseVoice) {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'ja-JP';
                utter.rate = 0.85;
                utter.pitch = 1.0;
                utter.voice = japaneseVoice;
                synth.speak(utter);
                return;
            }

            // 没有日语语音包时，尝试 Google Translate 在线 TTS（仅日语）
            const url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=ja&client=tw-ob&q=' + encodeURIComponent(text);
            const audio = new Audio(url);
            audio.play().catch((err) => {
                console.log('在线日语 TTS 播放失败:', err);
                // 最后再尝试系统默认语音，让用户至少能听到内容（但可能是中文发音）
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'ja-JP';
                utter.rate = 0.85;
                utter.pitch = 1.0;
                synth.speak(utter);
            });
        }
        
        function speakEnglish(index) {
            if (!synth) return;
            const item = items[index];
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(item.english);
            utter.lang = 'en-US';
            utter.rate = 0.85;
            utter.pitch = 1.05;
            if (englishVoice) utter.voice = englishVoice;
            synth.speak(utter);
            showMascot(item.english + ' 🇺🇸 English');
        }
        
        function playEnglish(index) {
            speakEnglish(index);
        }

        function showMascot(text) { document.getElementById('mascotText').textContent = text; }
        
        function playWord(index) {
            const item = items[index];
            speak(item.word + '，' + item.pinyin);
            showMascot('这是' + item.word + '，' + item.pinyin + '。');
        }
        
        function playSentence(index) {
            const item = items[index];
            speak(item.summary);
            showMascot(item.summary);
        }
        
        function switchCard(direction) {
            const cards = document.querySelectorAll('.card');
            const dots = document.querySelectorAll('.progress-dot');
            cards[currentIndex].classList.remove('active');
            dots[currentIndex].classList.remove('active');
            if (direction === 'next') currentIndex = (currentIndex + 1) % items.length;
            else currentIndex = (currentIndex - 1 + items.length) % items.length;
            cards[currentIndex].classList.add('active');
            dots[currentIndex].classList.add('active');
            const item = items[currentIndex];
            speak(item.word);
            showMascot('这是' + item.word + '，' + item.pinyin + '。');
        }
        
        function nextItem() { switchCard('next'); }
        function prevItem() { switchCard('prev'); }
        
        renderCards();
        
        function startApp() {
            document.getElementById('startOverlay').style.display = 'none';
            renderCards();
            if (items.length > 0) {
                speak('你好！我是小豆。今天我们来学习职业梦想。');
                showMascot('你好！我是小豆。今天我们来学习职业梦想。');
            }
        }
        
        // 滑动切换
        const mainStage = document.getElementById('mainStage');
        mainStage.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: true });
        
        mainStage.addEventListener('touchmove', function(e) {
            // 默认不阻止，保留垂直滚动
        }, { passive: true });
        
        mainStage.addEventListener('touchend', function(e) {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;
            const timeDiff = Date.now() - touchStartTime;
            
            // 如果主要是水平滑动，且距离和时间满足条件
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > SWIPE_THRESHOLD && timeDiff < 500) {
                if (diffX > 0) nextItem();
                else prevItem();
            }
        }, { passive: true });
    </script>
</body>
</html>
