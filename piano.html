<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小豆中文 - 音乐钢琴</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #E8F5E9 0%, #FFF8E1 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .back-bar { display: block; padding: 12px 15px; color: #666; text-decoration: none; font-size: 15px; background: rgba(255,255,255,0.5); }
        .header { text-align: center; padding: 15px 10px 10px; }
        .header h1 { color: #FF8C42; font-size: 28px; margin-bottom: 5px; }
        .header p { color: #888; font-size: 14px; }

        .song-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px 15px;
            flex-wrap: wrap;
        }
        .song-btn {
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            background: white;
            color: #666;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
        }
        .song-btn.active { background: #FF8C42; color: white; }
        .song-btn:active { transform: scale(0.95); }

        .song-panel {
            background: white;
            border-radius: 25px;
            margin: 10px 15px 15px;
            padding: 20px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
        }
        .song-title { font-size: 20px; color: #333; margin-bottom: 12px; font-weight: bold; }
        .song-notes {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .note {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #FFF0E6;
            color: #FF8C42;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            user-select: none;
        }
        .note.active { background: #FF8C42; color: white; transform: scale(1.1); }
        .note.low::after, .note.high::after {
            content: "";
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #FF8C42;
        }
        .note.low::after { bottom: 2px; }
        .note.high::after { top: 2px; }
        .note.active.low::after, .note.active.high::after { background: white; }

        .play-btn {
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 16px;
            background: #66BB6A;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .play-btn:active { transform: scale(0.95); }
        .play-btn:disabled { opacity: 0.6; }
        
        .assist-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .assist-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            padding: 6px 12px;
            background: #f5f5f5;
            border-radius: 20px;
        }
        .assist-toggle input { width: 18px; height: 18px; accent-color: #66BB6A; }
        
        .follow-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            padding: 6px 12px;
            background: #f5f5f5;
            border-radius: 20px;
        }
        .follow-toggle input { width: 18px; height: 18px; accent-color: #FF8C42; }
        
        .status-text { font-size: 13px; color: #66BB6A; min-height: 20px; }
        .status-text.waiting { color: #FF8C42; }

        /* 横向钢琴 */
        .piano-wrapper {
            background: #333;
            border-radius: 15px 15px 15px 15px;
            padding: 15px 10px 0;
            margin: 0 15px 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .white-keys {
            display: flex;
            height: 100%;
            gap: 3px;
        }
        .white-key {
            flex: 1;
            background: white;
            border-radius: 0 0 8px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 12px;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.2);
            transition: background 0.05s, transform 0.05s;
            position: relative;
            z-index: 1;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            user-select: none;
        }
        .white-key:active, .white-key.active {
            background: #FFE0B2;
            transform: translateY(2px);
        }
        .white-key .solfege { font-size: 14px; color: #FF8C42; font-weight: bold; margin-bottom: 4px; }
        .white-key .number { font-size: 12px; color: #999; }

        .black-keys {
            position: absolute;
            top: 15px;
            left: 10px;
            right: 10px;
            height: 130px;
            display: flex;
            pointer-events: none;
        }
        .black-key {
            position: absolute;
            width: 10%;
            height: 100%;
            background: #222;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            transition: background 0.05s, transform 0.05s;
            z-index: 2;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            user-select: none;
        }
        .black-key:active, .black-key.active {
            background: #444;
            transform: translateY(2px);
        }
        .black-key .solfege { font-size: 11px; color: #FF8C42; }
        
        /* 辅助练习提示 */
        .white-key.hint {
            background: #C8E6C9 !important;
            box-shadow: 0 0 12px #66BB6A;
            transform: translateY(2px);
            animation: pulseHint 1s infinite;
        }
        .black-key.hint {
            background: #2E7D32 !important;
            box-shadow: 0 0 12px #66BB6A;
            transform: translateY(2px);
            animation: pulseHint 1s infinite;
        }
        .black-key.hint .solfege { color: #FFF; }
        @keyframes pulseHint {
            0%, 100% { box-shadow: 0 0 8px #66BB6A; }
            50% { box-shadow: 0 0 18px #66BB6A; }
        }

        @media (max-width: 400px) {
            .song-btn { padding: 7px 12px; font-size: 13px; }
            .note { width: 32px; height: 32px; font-size: 16px; }
            .piano-wrapper { height: 200px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-bar">← 回首页</a>
    <div class="header">
        <h1>🎹 音乐钢琴</h1>
        <p>点琴键或歌谱，一起来弹琴吧</p>
    </div>

    <div class="song-selector" id="songSelector">
        <button class="song-btn active" data-index="0">小星星</button>
        <button class="song-btn" data-index="1">两只老虎</button>
        <button class="song-btn" data-index="2">找朋友</button>
        <button class="song-btn" data-index="3">生日快乐</button>
    </div>

    <div class="song-panel">
        <div class="song-title" id="songTitle">小星星</div>
        <div class="song-notes" id="songNotes"></div>
        <div class="assist-bar">
            <label class="assist-toggle">
                <input type="checkbox" id="assistMode">
                <span>💡 辅助练习</span>
            </label>
            <label class="follow-toggle">
                <input type="checkbox" id="followMode">
                <span>👆 跟我弹</span>
            </label>
        </div>
        <div class="status-text" id="statusText"></div>
        <button class="play-btn" id="playBtn">▶ 播放儿歌</button>
    </div>

    <div class="piano-wrapper">
        <div class="black-keys" id="blackKeys"></div>
        <div class="white-keys" id="whiteKeys"></div>
    </div>

    <div class="footer">适合 3-6 岁宝宝的音乐启蒙</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function ensureAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    const baseFreq = 261.63; // C4
    const scaleNames = ['do','re','mi','fa','sol','la','si','do'];
    const whiteNotes = ['C4','D4','E4','F4','G4','A4','B4','C5'];
    const blackNotes = ['C#4','D#4','F#4','G#4','A#4'];
    // 横向排列：黑键位于两个白键之间（百分比 left）
    const blackPositions = [8, 20, 45, 58, 70]; // 百分比 left

    function noteToFreq(noteName) {
        const noteMap = {
            'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13,
            'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00,
            'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46,
            'G5': 783.99, 'A5': 880.00, 'B5': 987.77, 'C6': 1046.50,
            'B3': 246.94, 'A3': 220.00, 'G3': 196.00, 'F3': 174.61,
            'E3': 164.81, 'D3': 146.83, 'C3': 130.81
        };
        return noteMap[noteName] || 440;
    }

    function playTone(freq, duration = 0.3) {
        ensureAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // 简谱数字 1-7 对应 C4-D4-E4-F4-G4-A4-B4
    function numberToNote(num, octave = 0) {
        const map = {1:'C',2:'D',3:'E',4:'F',5:'G',6:'A',7:'B'};
        const base = 4 + octave;
        return map[num] + base;
    }

    const songs = [
        {
            name: "小星星",
            notes: [1,1,5,5,6,6,5, 4,4,3,3,2,2,1]
        },
        {
            name: "两只老虎",
            notes: [1,2,3,1, 1,2,3,1, 3,4,5, 3,4,5, 5,6,5,4,3,1, 5,6,5,4,3,1]
        },
        {
            name: "找朋友",
            notes: [5,6,5,4,3,1, 5,6,5,4,3,1, 1,1,3,5,3,1]
        },
        {
            name: "生日快乐",
            notes: [5,5,6,5,{n:1,o:1},{n:7,o:-1}, 5,5,6,5,{n:2,o:1},{n:1,o:1}]
        }
    ];

    let currentSongIndex = 0;
    let isPlaying = false;
    let assistMode = false;
    let followMode = false;
    let followStep = 0;
    let followResolver = null;
    let currentHintNote = null;

    function buildPiano() {
        const whiteContainer = document.getElementById('whiteKeys');
        const blackContainer = document.getElementById('blackKeys');

        whiteNotes.forEach((note, i) => {
            const key = document.createElement('div');
            key.className = 'white-key';
            key.dataset.note = note;
            key.innerHTML = `<span class="solfege">${scaleNames[i]}</span><span class="number">${i < 7 ? i+1 : '1'}</span>`;
            key.addEventListener('mousedown', () => playKey(key, note));
            key.addEventListener('touchstart', (e) => { e.preventDefault(); playKey(key, note); }, { passive: false });
            whiteContainer.appendChild(key);
        });

        blackNotes.forEach((note, i) => {
            const key = document.createElement('div');
            key.className = 'black-key';
            key.dataset.note = note;
            key.style.left = blackPositions[i] + '%';
            key.innerHTML = `<div class="solfege">${['do#','re#','fa#','sol#','la#'][i]}</div>`;
            key.addEventListener('mousedown', () => playKey(key, note));
            key.addEventListener('touchstart', (e) => { e.preventDefault(); playKey(key, note); }, { passive: false });
            blackContainer.appendChild(key);
        });
    }

    function playKey(keyEl, noteName) {
        playTone(noteToFreq(noteName));
        keyEl.classList.add('active');
        setTimeout(() => keyEl.classList.remove('active'), 150);
        
        // 跟我弹：检查是否按对
        if (followMode && currentHintNote === noteName) {
            if (followResolver) {
                followResolver();
                followResolver = null;
            }
        }
    }

    function noteItemToName(item) {
        let num, octave;
        if (typeof item === 'number') { num = item; octave = 0; }
        else { num = item.n; octave = item.o || 0; }
        return numberToNote(num, octave);
    }
    
    function clearHint() {
        document.querySelectorAll('.white-key, .black-key, .note').forEach(el => el.classList.remove('hint'));
        currentHintNote = null;
    }
    
    function setHintByIndex(song, index) {
        clearHint();
        if (index >= song.notes.length) return;
        const noteName = noteItemToName(song.notes[index]);
        currentHintNote = noteName;
        const key = document.querySelector(`[data-note="${noteName}"]`);
        if (key) key.classList.add('hint');
        const noteEls = document.querySelectorAll('.song-notes .note');
        if (noteEls[index]) noteEls[index].classList.add('hint');
    }
    
    function playNoteItem(item, noteEl) {
        let num, octave;
        if (typeof item === 'number') {
            num = item; octave = 0;
        } else {
            num = item.n; octave = item.o || 0;
        }
        const noteName = numberToNote(num, octave);
        playTone(noteToFreq(noteName));

        // 高亮琴键
        const key = document.querySelector(`[data-note="${noteName}"]`);
        if (key) playKey(key, noteName);

        if (noteEl) {
            noteEl.classList.add('active');
            setTimeout(() => noteEl.classList.remove('active'), 200);
        }
    }

    function renderSong() {
        const song = songs[currentSongIndex];
        document.getElementById('songTitle').textContent = song.name;
        const container = document.getElementById('songNotes');
        container.innerHTML = '';

        song.notes.forEach((item, i) => {
            let num, octave;
            if (typeof item === 'number') { num = item; octave = 0; }
            else { num = item.n; octave = item.o || 0; }

            const el = document.createElement('div');
            el.className = 'note' + (octave < 0 ? ' low' : octave > 0 ? ' high' : '');
            el.textContent = num;
            el.addEventListener('click', () => playNoteItem(item, el));
            container.appendChild(el);
        });
    }

    async function playSong() {
        if (isPlaying) return;
        isPlaying = true;
        const btn = document.getElementById('playBtn');
        const statusText = document.getElementById('statusText');
        btn.disabled = true;
        btn.textContent = '⏸ 播放中...';
        clearHint();

        const song = songs[currentSongIndex];
        for (let i = 0; i < song.notes.length; i++) {
            const noteEls = document.querySelectorAll('.song-notes .note');
            
            if (assistMode) {
                setHintByIndex(song, i);
            }
            
            if (followMode) {
                statusText.textContent = `👆 请按：${noteItemToName(song.notes[i])}`;
                statusText.classList.add('waiting');
                await waitForKey(song.notes[i]);
                statusText.classList.remove('waiting');
                statusText.textContent = '';
            }
            
            playNoteItem(song.notes[i], noteEls[i]);
            await new Promise(r => setTimeout(r, followMode ? 800 : assistMode ? 800 : 500));
        }

        clearHint();
        statusText.textContent = '✅ 弹完啦！';
        isPlaying = false;
        btn.disabled = false;
        btn.textContent = '▶ 播放儿歌';
    }
    
    function waitForKey(item) {
        return new Promise(resolve => {
            followResolver = resolve;
        });
    }

    document.getElementById('songSelector').addEventListener('click', (e) => {
        if (e.target.classList.contains('song-btn')) {
            document.querySelectorAll('.song-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentSongIndex = parseInt(e.target.dataset.index);
            clearHint();
            document.getElementById('statusText').textContent = '';
            renderSong();
        }
    });

    document.getElementById('playBtn').addEventListener('click', playSong);
    
    document.getElementById('assistMode').addEventListener('change', (e) => {
        assistMode = e.target.checked;
    });
    
    document.getElementById('followMode').addEventListener('change', (e) => {
        followMode = e.target.checked;
    });

    buildPiano();
    renderSong();
</script>
</body>
</html>
